<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une lettre pour toi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient-glow glow-one" aria-hidden="true"></div>
    <div class="ambient-glow glow-two" aria-hidden="true"></div>
    <div class="ambient-glow glow-three" aria-hidden="true"></div>

    <div class="particles" aria-hidden="true"></div>
    <div class="petal-stage" aria-hidden="true"></div>

    <main class="page-shell">
        <section class="intro" aria-label="Lettre d'excuses">
            <p class="eyebrow">Pour toi</p>
            <h1>Je voulais te parler avec douceur</h1>
            <p class="subtitle">
                Une petite lettre, quelques fleurs, et toute la sincérité que les mots peuvent porter.
            </p>
        </section>

        <section class="letter-scene" aria-label="Enveloppe interactive">
            <div class="envelope" role="button" tabindex="0" aria-label="Ouvrir la lettre">
                <div class="envelope-shadow" aria-hidden="true"></div>
                <div class="letter-paper">
                    <!-- Modifie simplement ce bloc pour changer le texte de la lettre. -->
                    <div id="apology-message">
TON MESSAGE ICI
                    </div>
                    <span class="type-cursor" aria-hidden="true"></span>
                </div>
                <div class="envelope-back" aria-hidden="true"></div>
                <div class="envelope-front" aria-hidden="true"></div>
                <div class="envelope-flap" aria-hidden="true"></div>
                <div class="wax-heart" aria-hidden="true"></div>
            </div>
        </section>

        <section class="final-section" aria-live="polite">
            <button class="final-button" type="button">Clique ici</button>
            <p class="thanks-message">Merci d'avoir pris le temps de lire cette lettre ❤️</p>
        </section>
    </main>

    <div class="flower-field">
        <button class="flower flower-red flower-one" type="button" aria-label="Fleur rouge interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>

        <button class="flower flower-white flower-two" type="button" aria-label="Fleur blanche interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>

        <button class="flower flower-red flower-three" type="button" aria-label="Fleur rouge interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>

        <button class="flower flower-white flower-four" type="button" aria-label="Fleur blanche interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>

        <button class="flower flower-red flower-five" type="button" aria-label="Fleur rouge interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>

        <button class="flower flower-white flower-six" type="button" aria-label="Fleur blanche interactive">
            <span class="stem"></span>
            <span class="leaf leaf-left"></span>
            <span class="leaf leaf-right"></span>
            <span class="bloom">
                <span class="petal petal-a"></span>
                <span class="petal petal-b"></span>
                <span class="petal petal-c"></span>
                <span class="petal petal-d"></span>
                <span class="center"></span>
            </span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
